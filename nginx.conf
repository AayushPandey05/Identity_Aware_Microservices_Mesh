events { worker_connections 1024; }

http {
    include       mime.types;
    default_type  application/octet-stream;

    server {
        listen 80;

        # 1. Serves the Swiggy Frontend (HTML/CSS/JS)
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        # 2. API Gateway: Routes all /api/ calls to the C++ Backend
        # We can use a regex to handle both register AND login in one block!
        location ~ ^/api/(register|login) {
            proxy_pass http://user_service:8080; 
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            
            # CORS Headers for Browser Security
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;

            # Handle Pre-flight OPTIONS requests
            if ($request_method = 'OPTIONS') {
                return 204;
            }
        }
    }
}